# 当前默认环境，可选: dev / staging / prod
active_env: dev

# 多环境配置；可通过 LOCUST_ENV 临时覆盖 active_env
environments:
  dev:
    # 压测目标主机（协议 + 域名/IP + 端口）
    locust_host: "http://192.168.47.129:80"
    # 无头模式默认并发用户数
    locust_users: 10
    # 无头模式默认每秒启动用户数
    locust_spawn_rate: 10
    # 无头模式默认压测时长（如 5m / 1h）
    locust_run_time: "5m"
    # WebUI 端口
    locust_web_port: 8089
    # WebUI 模式是否自动重载 py 文件变更
    locust_web_reload: true

    # 登录接口路径
    login_path: "/ecshop/user.php"
    # 默认登录用户名
    login_username: "test"
    # 默认登录密码
    login_password: "123456"
    # 参数化数据文件路径（支持 .csv/.json；空字符串表示不启用）
    data_file: ""

  staging:
    locust_host: "http://staging.example.com"
    locust_users: 20
    locust_spawn_rate: 10
    locust_run_time: "10m"
    locust_web_port: 8090
    locust_web_reload: true
    login_path: "/ecshop/user.php"
    login_username: "staging_user"
    login_password: "staging_pass"
    data_file: ""

  prod:
    locust_host: "http://prod.example.com"
    locust_users: 50
    locust_spawn_rate: 20
    locust_run_time: "15m"
    locust_web_port: 8091
    # 生产环境建议关闭自动重载，避免调试脚本触发重启
    locust_web_reload: false
    login_path: "/ecshop/user.php"
    login_username: "prod_user"
    login_password: "prod_pass"
    data_file: ""
