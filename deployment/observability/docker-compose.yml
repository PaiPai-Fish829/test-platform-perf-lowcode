services:
  prometheus:
    image: prom/prometheus:latest
    container_name: locust-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - LOCUST_JOB=${LOCUST_JOB:-locust}
      - LOCUST_TARGETS=${LOCUST_TARGETS:-host.docker.internal:8089}
      - NODE_JOB=${NODE_JOB:-centos-vm}
      - NODE_TARGETS=${NODE_TARGETS:-192.168.47.129:9100}
      - SCRAPE_INTERVAL=${SCRAPE_INTERVAL:-5s}

  grafana:
    image: grafana/grafana:latest
    container_name: locust-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
