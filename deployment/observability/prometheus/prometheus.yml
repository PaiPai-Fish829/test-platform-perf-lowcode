global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "locust"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8089"]

  - job_name: "centos-vm"
    static_configs:
      - targets: ["192.168.47.129:9100"]
